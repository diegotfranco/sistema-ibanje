name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sistema_ibanje
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sistema_ibanje
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: test_session_secret_at_least_32_characters_long_xxxxx
      ARGON2_PEPPER: test_argon2_pepper_at_least_32_characters_long_xxxxxxxx
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: receipts
      RESEND_API_KEY: re_test
      EMAIL_FROM_NOREPLY: 'Test <no-reply@test.local>'
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
