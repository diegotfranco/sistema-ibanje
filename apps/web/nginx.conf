# If an upstream proxy (e.g. cloudflared) already set X-Forwarded-Proto, keep it;
# otherwise fall back to the scheme of the request to nginx.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reasonable upload ceiling (must allow API receipt uploads — 5MB plus headroom)
  client_max_body_size 10M;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript application/xml font/woff2 image/svg+xml;
  gzip_min_length 1024;

  # Long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy — strip /api/ prefix to match the Vite dev proxy semantics.
  # The trailing slash on both location and proxy_pass is critical: it removes /api/.
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 60s;
  }

  # SPA fallback: serve index.html for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't cache the entry HTML — must always pull fresh to get new asset hashes
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
